name: Build & Deploy APK

on:
  pull_request:
    branches: ['**']
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-deploy:
    name: Build APK & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs || true

      - name: Extract version & branch info
        id: info
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | cut -c1-40)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          PR_NUMBER="${{ github.event.pull_request.number }}"
          ISSUE_NUM=$(echo "$BRANCH" | grep -oP 'issue-\K\d+' || echo "")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env file
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

      - name: Build APK (arm64 only, production release)
        run: flutter build apk --release --flavor production --target-platform android-arm64 || true
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=false"

      - name: Find APK
        id: apk
        run: |
          APK_PATH=$(find build -name "*.apk" 2>/dev/null | grep -v "intermediates\|test" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: Nessun APK prodotto dal build"
            exit 1
          fi
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          PR="${{ steps.info.outputs.pr_number }}"
          SHA="${{ steps.info.outputs.short_sha }}"
          if [ -n "$PR" ]; then
            APK_NAME="finn-pr${PR}-${SHA}.apk"
          else
            APK_NAME="finn-v${{ steps.info.outputs.version }}-${SHA}.apk"
          fi
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          cp "${{ steps.apk.outputs.path }}" "$APK_NAME"

      - name: Deploy APK to app-hub
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /var/www/app-hub/downloads/test"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "$APK_NAME" \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/app-hub/downloads/test/

      - name: Fetch issue title
        id: issue
        if: steps.info.outputs.issue_num != ''
        run: |
          ISSUE_NUM="${{ steps.info.outputs.issue_num }}"
          REPO="${{ github.repository }}"
          ISSUE_TITLE=$(gh issue view "$ISSUE_NUM" --repo "$REPO" --json title --jq '.title' 2>/dev/null || echo "")
          echo "title=$ISSUE_TITLE" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment PR with APK link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const apkName = process.env.APK_NAME;
            const url = `https://apps.8020solutions.org/downloads/test/${apkName}`;
            const issueNum = '${{ steps.info.outputs.issue_num }}';
            const issueTitle = '${{ steps.issue.outputs.title }}';
            const issueRef = issueNum ? `\n\n📋 **Issue:** #${issueNum} — ${issueTitle}` : '';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `📲 **APK pronto per il test!**\n\n🔗 [${apkName}](${url})${issueRef}\n\n> Scarica e installa direttamente sul tuo dispositivo Android.`
            });

      - name: Notify Ciccio
        if: success()
        run: |
          ISSUE_NUM="${{ steps.info.outputs.issue_num }}"
          PR_NUM="${{ steps.info.outputs.pr_number }}"
          SHORT="${{ steps.info.outputs.short_sha }}"
          BRANCH="${{ steps.info.outputs.branch }}"
          REPO="${{ github.repository }}"
          URL="https://apps.8020solutions.org/downloads/test/${APK_NAME}"

          # Costruisci il riferimento issue/PR
          if [ -n "$PR_NUM" ] && [ -n "$ISSUE_NUM" ]; then
            CONTEXT="Issue #${ISSUE_NUM} — PR #${PR_NUM}\nhttps://github.com/${REPO}/issues/${ISSUE_NUM}"
          elif [ -n "$PR_NUM" ]; then
            CONTEXT="PR #${PR_NUM}\nhttps://github.com/${REPO}/pull/${PR_NUM}"
          elif [ -n "$ISSUE_NUM" ]; then
            CONTEXT="Issue #${ISSUE_NUM}\nhttps://github.com/${REPO}/issues/${ISSUE_NUM}"
          else
            CONTEXT="Branch: ${BRANCH}"
          fi

          MSG="✅ Finn — APK pronto (${SHORT})\n${CONTEXT}\n📲 ${URL}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "ciccio-notify '${MSG}'" || true
